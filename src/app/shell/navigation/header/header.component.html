<header class="header" [class.scrolled]="isScrolled">
  <div class="header__container">
    <!-- Logo / Brand -->
    <div class="header__brand">
      <a routerLink="/" class="header__logo">
        <span class="header__logo-mark header__logo-mark--short">Frakx</span>
        <span class="header__logo-mark header__logo-mark--full">Frakxman</span>
      </a>
    </div>

    <!-- Navigation -->
    <nav class="header__nav">
      <a
        routerLink="/portfolio/about"
        routerLinkActive="header__nav-link--active"
        class="header__nav-link"
        aria-label="Portfolio"
        title="Portfolio"
      >
        <span class="header__nav-icon" aria-hidden="true">💼</span>
        <span class="header__nav-text">Portfolio</span>
      </a>

      <a
        routerLink="/playground"
        routerLinkActive="header__nav-link--active"
        class="header__nav-link"
        aria-label="Architecture Playground"
        title="Architecture Playground"
      >
        <span class="header__nav-icon" aria-hidden="true">🧪</span>
        <span class="header__nav-text">Architecture Playground</span>
      </a>
    </nav>

    <!-- Section Indicator -->
    <div class="header__section" *ngIf="isPlayground || isPortfolio">
      <span class="header__section-badge" [class.header__section-badge--playground]="isPlayground">
        {{ isPlayground ? '🧪 Playground Mode' : '💼 Portfolio' }}
      </span>
    </div>
  </div>
</header>
