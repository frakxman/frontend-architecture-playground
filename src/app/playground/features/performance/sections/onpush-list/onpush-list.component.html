<div class="comparison-widget comparison-widget--onpush">

  <div class="widget-header">
    <div class="widget-label widget-label--onpush">
      <span>⚡ OnPush</span>
    </div>
    <span class="render-counter" [class.render-counter--active]="renderCount > 0">
      {{ renderCount }} renders
    </span>
  </div>

  <div class="widget-code">
    <code ngNonBindable>changeDetection: ChangeDetectionStrategy.<span class="highlight">OnPush</span></code>
  </div>

  <div class="widget-actions">
    <button class="widget-btn widget-btn--primary" (click)="loadItems()" [disabled]="isListVisible">
      Load items
    </button>
    <button class="widget-btn widget-btn--warn" (click)="triggerChangeWrong()" [disabled]="!isListVisible"
            title="Mutates in place — OnPush won't re-render">
      ❌ Mutate
    </button>
    <button class="widget-btn widget-btn--good" (click)="triggerChangeCorrect()" [disabled]="!isListVisible"
            title="New reference — OnPush will re-render">
      ✅ New ref
    </button>
    <button class="widget-btn widget-btn--ghost" (click)="reset()" [disabled]="!isListVisible">
      Reset
    </button>
  </div>

  <div class="widget-list" *ngIf="isListVisible">
    <div class="list-item" *ngFor="let item of items.slice(0, 20); trackBy: trackByFn"
         [style.background]="getIntensity(item.value)">
      <span class="item-id">#{{ item.id }}</span>
      <span class="item-name">{{ item.name }}</span>
      <span class="item-value">{{ item.value.toFixed(2) }}</span>
    </div>
    <p class="list-footer">Showing 20 of {{ items.length }}</p>
  </div>

  <div class="widget-empty" *ngIf="!isListVisible">
    <span>Click "Load items" to start</span>
  </div>

  <div class="widget-hint">
    💡 <strong>❌ Mutate</strong> won't update the view — <strong>✅ New ref</strong> will
  </div>

</div>
