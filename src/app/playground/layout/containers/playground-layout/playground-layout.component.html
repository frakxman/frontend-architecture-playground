<div class="dashboard">
  <div class="playground-layout">

  <!-- Mobile menu toggle -->
  <button
    type="button"
    class="playground-hamburger"
    [class.playground-hamburger--open]="mobileMenuOpen"
    (click)="toggleMobileMenu()"
    [attr.aria-label]="mobileMenuOpen ? 'Close menu' : 'Open menu'"
    [attr.aria-expanded]="mobileMenuOpen"
  >
    <svg
      class="playground-hamburger__icon"
      viewBox="0 0 24 24"
      width="24"
      height="24"
      aria-hidden="true"
      focusable="false"
    >
      <line class="playground-hamburger__line" x1="4" y1="7" x2="20" y2="7" />
      <line class="playground-hamburger__line" x1="4" y1="12" x2="20" y2="12" />
      <line class="playground-hamburger__line" x1="4" y1="17" x2="20" y2="17" />
    </svg>
  </button>

  <!-- Sidebar Component -->
  <app-playground-sidebar
    [isOpen]="mobileMenuOpen"
    (navClick)="onNavClick($event)">
  </app-playground-sidebar>

  <!-- Mobile overlay -->
  <div
    class="playground-overlay"
    [class.playground-overlay--open]="mobileMenuOpen"
    (click)="closeMobileMenu()"
    role="button"
    tabindex="-1"
    aria-label="Close menu"
  ></div>

  <!-- Main Content Area -->
  <main class="playground-content">

    <!-- Router Outlet -->
    <div class="content-router">
      <router-outlet />
    </div>

  </main>

  </div>
</div>
